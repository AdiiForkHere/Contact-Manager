{% extends 'base.html' %}
{% block content %}

<a href="/add">Add Contact</a>

<table>
    <tr>
        <th>Name</th>
        <th>Phone</th>
        <th>Email</th>
        <th>Actions</th>
    </tr>

    {% for c in contacts %}
    <tr>
        <td>{{ c.name }}</td>
        <td>{{ c.phone }}</td>
        <td>{{ c.email }}</td>
        <td>
            <a href="/edit/{{ c.id }}" class="action-btn">Edit</a>
            <a href="/delete/{{ c.id }}" class="delete-btn">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
